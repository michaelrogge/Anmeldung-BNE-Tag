{% extends "base.html" %}

{% block title %}Workshop erstellen - {{ event.name }}{% endblock %}

{% block content %}
<div class="content" style="max-width: 600px; margin: 0 auto;">
    <h1>➕ Workshop erstellen</h1>
    <p><strong>Veranstaltung:</strong> {{ event.name }}</p>
    
    <form method="POST">
        <div class="form-group">
            <label for="name">Workshop-Name *</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="description">Beschreibung</label>
            <textarea id="description" name="description"></textarea>
        </div>
        
        <div class="form-group">
            <label for="start_time">Startzeit *</label>
            <input type="datetime-local" id="start_time" name="start_time" required>
        </div>
        
        <div class="form-group">
            <label for="end_time">Endzeit *</label>
            <input type="datetime-local" id="end_time" name="end_time" required>
        </div>
        
        <div class="form-group">
            <label for="location">Raum/Ort</label>
            <input type="text" id="location" name="location" placeholder="z.B. Raum A-101">
        </div>
        
        <div class="form-group">
            <label for="max_capacity">Max. Teilnehmerkapazität *</label>
            <input type="number" id="max_capacity" name="max_capacity" value="30" min="1" required>
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <button type="submit">✅ Workshop erstellen</button>
            <a href="/admin/event/{{ event.id }}" class="btn btn-secondary">← Abbrechen</a>
        </div>
    </form>
</div>
{% endblock %}
